<svg xmlns="http://www.w3.org/2000/svg" width="680" height="310" viewBox="0 0 680 310" role="img">
  <title>Generic Binary Search Tree</title>
  <desc>BST with root 50, smaller on left, larger on right</desc>
  <line x1="340" y1="80" x2="210" y2="148" stroke="#C0DD97" stroke-width="2"/>
  <line x1="340" y1="80" x2="470" y2="148" stroke="#C0DD97" stroke-width="2"/>
  <line x1="210" y1="188" x2="142" y2="244" stroke="#C0DD97" stroke-width="1.5"/>
  <line x1="210" y1="188" x2="278" y2="244" stroke="#C0DD97" stroke-width="1.5"/>
  <line x1="470" y1="188" x2="402" y2="244" stroke="#C0DD97" stroke-width="1.5"/>
  <line x1="470" y1="188" x2="538" y2="244" stroke="#C0DD97" stroke-width="1.5"/>
  <circle cx="340" cy="54" r="34" fill="#27500A"/>
  <text font-family="sans-serif" font-size="16" font-weight="500" x="340" y="48" text-anchor="middle" dominant-baseline="central" fill="#EAF3DE">50</text>
  <text font-family="sans-serif" font-size="10" x="340" y="66" text-anchor="middle" dominant-baseline="central" fill="#97C459">root</text>
  <circle cx="210" cy="168" r="28" fill="#3B6D11"/>
  <text font-family="sans-serif" font-size="15" font-weight="500" x="210" y="168" text-anchor="middle" dominant-baseline="central" fill="#EAF3DE">30</text>
  <circle cx="470" cy="168" r="28" fill="#3B6D11"/>
  <text font-family="sans-serif" font-size="15" font-weight="500" x="470" y="168" text-anchor="middle" dominant-baseline="central" fill="#EAF3DE">70</text>
  <circle cx="142" cy="260" r="24" fill="#639922"/>
  <text font-family="sans-serif" font-size="14" font-weight="500" x="142" y="260" text-anchor="middle" dominant-baseline="central" fill="#EAF3DE">20</text>
  <circle cx="278" cy="260" r="24" fill="#639922"/>
  <text font-family="sans-serif" font-size="14" font-weight="500" x="278" y="260" text-anchor="middle" dominant-baseline="central" fill="#EAF3DE">40</text>
  <circle cx="402" cy="260" r="24" fill="#639922"/>
  <text font-family="sans-serif" font-size="14" font-weight="500" x="402" y="260" text-anchor="middle" dominant-baseline="central" fill="#EAF3DE">60</text>
  <circle cx="538" cy="260" r="24" fill="#639922"/>
  <text font-family="sans-serif" font-size="14" font-weight="500" x="538" y="260" text-anchor="middle" dominant-baseline="central" fill="#EAF3DE">80</text>
  <rect x="80" y="116" width="92" height="20" rx="10" fill="#EAF3DE"/>
  <text font-family="sans-serif" font-size="10" x="126" y="126" text-anchor="middle" dominant-baseline="central" fill="#27500A">left smaller</text>
  <rect x="508" y="116" width="92" height="20" rx="10" fill="#EAF3DE"/>
  <text font-family="sans-serif" font-size="10" x="554" y="126" text-anchor="middle" dominant-baseline="central" fill="#27500A">right larger</text>
  <text font-family="sans-serif" font-size="12" x="340" y="298" text-anchor="middle" fill="#B4B2A9">inorder: 20 → 30 → 40 in order... 50 → 60 → 70 → 80 (sorted)</text>
</svg>
