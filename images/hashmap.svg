<svg xmlns="http://www.w3.org/2000/svg" width="680" height="290" viewBox="0 0 680 290" role="img"><title>Generic Hash Map</title><desc>Hash map with separate chaining</desc><defs><marker id="aarr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.2" stroke-linecap="round"/></marker><marker id="apush" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#534AB7" stroke-width="1.5" stroke-linecap="round"/></marker><marker id="achain" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1" stroke-linecap="round"/></marker></defs><rect x="20" y="118" width="72" height="36" rx="4" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/><text font-family="sans-serif" font-size="14" font-weight="500" x="56" y="136" text-anchor="middle" dominant-baseline="central" fill="#3C3489">"cat"</text><line x1="92" y1="136" x2="136" y2="136" stroke="#534AB7" stroke-width="1.5" marker-end="url(#apush)"/><rect x="140" y="108" width="100" height="56" rx="6" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/><text font-family="sans-serif" font-size="14" font-weight="500" x="190" y="130" text-anchor="middle" dominant-baseline="central" fill="#444441">hash()</text><text font-family="sans-serif" font-size="11" x="190" y="148" text-anchor="middle" dominant-baseline="central" fill="#888780">key % prime</text><line x1="240" y1="136" x2="278" y2="97" stroke="#888780" stroke-width="1.2" marker-end="url(#aarr)"/><rect x="284" y="38" width="68" height="34" rx="4" fill="#F1EFE8" stroke="#D3D1C7" stroke-width="0.5" opacity="0.6"/><text font-family="sans-serif" font-size="12" x="318" y="55" text-anchor="middle" dominant-baseline="central" fill="#888780">[0] null</text><rect x="284" y="80" wid