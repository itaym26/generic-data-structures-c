  <line x1="470" y1="188" x2="402" y2="244" stroke="#FAC775" stroke-width="1.5"/>
  <line x1="470" y1="188" x2="538" y2="244" stroke="#FAC775" stroke-width="1.5"/>
  <circle cx="340" cy="54" r="34" fill="#633806"/>
