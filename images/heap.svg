  <text font-family="sans-serif" font-size="15" font-weight="500" x="210" y="168" text-anchor="middle" dominant-baseline="central" fill="#FAEEDA">70</text>
  <circle cx="470" cy="168" r="28" fill="#844F4"/>
  <text font-family="sans-serif" font-size="15" font-weight="500" x="470" y="168" text-anchor="middle" dominant-baseline="central" fill="#FAEEDA">60</text>
  <circle cx="142" cy="260" r="24" fill="#BA7517"/>
  <text font-family="sans-serif" font-size="14" font-weight="500" x="142" y="260" text-anchor="middle" dominant-baseline="central" fill="#FAEEDA">40</text>
  <circle cx="278" cy="260" r="24" fill="#BA7517"/>
  <text font-family="sans-serif" font-size="14" font-weight="500" x="278" y="260" text-anchor="middle" dominant-baseline="central" fill="#FAEEDA">50</text>
  <circle cx="402" cy="260" r="24" fill="#BA7517"/>
