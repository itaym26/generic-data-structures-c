<svg xmlns="http://www.w3.org/2000/svg" width="680" height="320" viewBox="0 0 680 320" role="img">
  <title>Generic Stack — LIFO</title>
  <desc>Stack with push and pop operations, top element highlighted</desc>
  <defs>
    <marker id="ap" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#534AB7" stroke-width="1.5" stroke-linecap="round"/>
    </marker>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#993C1D" stroke-width="1.5" stroke-linecap="round"/>
    </marker>
  </defs>
  <rect x="240" y="30" width="160" height="240" rx="20" fill="none" stroke="#CECBF6" stroke-width="1.5" stroke-dasharray="6 3"/>
  <rect x="252" y="218" width="136" height="44" rx="12" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="13" font-weight="500" x="320" y="240" text-anchor="middle" dominant-baseline="central" fill="#5F5E5A">data[0]</text>
  <rect x="252" y="170" width="136" height="44" rx="12" fill="#E8E6FC" stroke="#AFA9EC" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="13" font-weight="500" x="320" y="192" text-anchor="middle" dominant-baseline="central" fill="#534AB7">data[1]</text>
  <rect x="252" y="122" width="136" height="44" rx="12" fill="#D8D4F8" stroke="#7F77DD" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="13" font-weight="500" x="320" y="144" text-anchor="middle" dominant-baseline="central" fill="#3C3489">data[2]</text>
  <rect x="252" y="50" width="136" height="48" rx="16" fill="#534AB7"/>
  <text font-family="sans-serif" font-size="13" font-weight="500" x="320" y="68" text-anchor="middle" dominant-baseline="central" fill="#EEEDFE">data[3]</text>
  <text font-family="sans-serif" font-size="11" x="320" y="86" text-anchor="middle" dominant-baseline="central" fill="#AFA9EC">top</text>
  <line x1="155" y1="74" x2="246" y2="74" stroke="#534AB7" stroke-width="1.5" marker-end="url(#ap)"/>
  <text font-family="sans-serif" font-size="12" x="80" y="62" text-anchor="middle" fill="#534AB7" font-weight="500">StackPush()</text>
  <text font-family="sans-serif" font-size="11" x="80" y="78" text-anchor="middle" fill="#534AB7">O(1)</text>
  <line x1="394" y1="74" x2="468" y2="74" stroke="#993C1D" stroke-width="1.5" marker-end="url(#ar)"/>
  <text font-family="sans-serif" font-size="12" x="546" y="62" text-anchor="middle" fill="#993C1D" font-weight="500">StackPop()</text>
  <text font-family="sans-serif" font-size="11" x="546" y="78" text-anchor="middle" fill="#993C1D">O(1)</text>
  <line x1="406" y1="50" x2="406" y2="262" stroke="#CECBF6" stroke-width="1" stroke-dasharray="3 2"/>
  <line x1="402" y1="50" x2="410" y2="50" stroke="#CECBF6" stroke-width="1"/>
  <line x1="402" y1="262" x2="410" y2="262" stroke="#CECBF6" stroke-width="1"/>
  <text font-family="sans-serif" font-size="11" x="424" y="158" dominant-baseline="central" fill="#888780">size=4</text>
  <text font-family="sans-serif" font-size="12" x="320" y="296" text-anchor="middle" fill="#888780">LIFO — last in, first out</text>
</svg>
