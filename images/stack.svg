<svg xmlns="http://www.w3.org/2000/svg" width="680" height="300" viewBox="0 0 680 300" role="img">
  <title>Generic Stack — LIFO</title>
  <desc>A stack showing push and pop operations with elements stacked vertically</desc>
  <style>
    text { font-family: sans-serif; fill: #3d3d3a; }
    .th { font-size: 14px; font-weight: 500; }
    .ts { font-size: 12px; }
    .box-gray { fill: #F1EFE8; stroke: #5F5E5A; }
    .box-purple { fill: #EEEDFE; stroke: #534AB7; }
    .label-gray { fill: #444441; }
    .label-purple { fill: #3C3489; }
    .label-purple-sub { fill: #534AB7; }
    .muted { fill: #888780; }
    .accent-push { fill: none; stroke: #534AB7; stroke-width: 1.5; }
    .accent-pop { fill: none; stroke: #993C1D; stroke-width: 1.5; }
  </style>
  <defs>
    <marker id="ap" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#534AB7" stroke-width="1.5" stroke-linecap="round"/>
    </marker>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#993C1D" stroke-width="1.5" stroke-linecap="round"/>
    </marker>
  </defs>

  <rect x="240" y="40" width="160" height="220" rx="4" fill="none" stroke="#B4B2A9" stroke-width="1" stroke-dasharray="4 3"/>
  <rect x="248" y="208" width="144" height="44" rx="4" class="box-gray" stroke-width="0.5"/>
  <text class="th label-gray" x="320" y="234" text-anchor="middle" dominant-baseline="central">data[0]</text>
  <rect x="248" y="160" width="144" height="44" rx="4" class="box-gray" stroke-width="0.5"/>
  <text class="th label-gray" x="320" y="186" text-anchor="middle" dominant-baseline="central">data[1]</text>
  <rect x="248" y="112" width="144" height="44" rx="4" class="box-gray" stroke-width="0.5"/>
  <text class="th label-gray" x="320" y="138" text-anchor="middle" dominant-baseline="central">data[2]</text>
  <rect x="248" y="64" width="144" height="44" rx="4" class="box-purple" stroke-width="1"/>
  <text class="th label-purple" x="320" y="82" text-anchor="middle" dominant-baseline="central">data[3]</text>
  <text class="ts label-purple-sub" x="320" y="98" text-anchor="middle" dominant-baseline="central">← top</text>
  <line x1="160" y1="86" x2="242" y2="86" class="accent-push" marker-end="url(#ap)"/>
  <text class="ts" x="80" y="76" text-anchor="middle" fill="#534AB7">StackPush()</text>
  <text class="ts" x="80" y="92" text-anchor="middle" fill="#534AB7">O(1)</text>
  <line x1="398" y1="86" x2="480" y2="86" fill="none" stroke="#993C1D" stroke-width="1.5" marker-end="url(#ar)"/>
  <text class="ts" x="560" y="76" text-anchor="middle" fill="#993C1D>StackPop()</text>
  <text class="ts" x="560" y="92" text-anchor="middle" fill="#993C1D>O(1)</text>
  <line x1="410" y1="64" x2="410" y2="252" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="3 2"/>
  <line x1="406" y1="64" x2="414" y2="64" stroke="#B4B2A9" stroke-width="0.5"/>
  <line x1="406" y1="252" x2="414" y2="252" stroke="#B4B2A9" stroke-width="0.5"/>
  <text class="ts muted" x="425" y="160" dominant-baseline="central">size=4</text>
  <text class="ts muted" x="320" y="278" text-anchor="middle">LIFO — last in, first out</text>
</svg>
