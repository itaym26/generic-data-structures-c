<svg xmlns="http://www.w3.org/2000/svg" width="680" height="220" viewBox="0 0 680 220" role="img">
  <title>Generic Vector — dynamic resizable array</title>
  <desc>Vector showing used slots, capacity, and grow operation</desc>
  <defs>
    <marker id="ag" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#185FA5" stroke-width="1.5" stroke-linecap="round"/>
    </marker>
  </defs>
  <rect x="60" y="75" width="82" height="60" rx="14" fill="#185FA5"/>
  <text font-family="sans-serif" font-size="13" font-weight="500" x="101" y="99" text-anchor="middle" dominant-baseline="central" fill="#E6F1FB">data[0]</text>
  <text font-family="sans-serif" font-size="11" x="101" y="117" text-anchor="middle" dominant-baseline="central" fill="#85B7EB">void*</text>
  <rect x="150" y="75" width="82" height="60" rx="14" fill="#378ADD"/>
  <text font-family="sans-serif" font-size="13" font-weight="500" x="191" y="99" text-anchor="middle" dominant-baseline="central" fill="#E6F1FB">data[1]</text>
  <text font-family="sans-serif" font-size="11" x="191" y="117" text-anchor="middle" dominant-baseline="central" fill="#B5D4F4">void*</text>
  <rect x="240" y="75" width="82" height="60" rx="14" fill="#85B7EB"/>
  <text font-family="sans-serif" font-size="13" font-weight="500" x="281" y="99" text-anchor="middle" dominant-baseline="central" fill="#042C53">data[2]</text>
  <text font-family="sans-serif" font-size="11" x="281" y="117" text-anchor="middle" dominant-baseline="central" fill="#0C447C">void*</text>
  <rect x="330" y="75" width="82" height="60" rx="14" fill="#B5D4F4"/>
  <text font-family="sans-serif" font-size="13" font-weight="500" x="371" y="99" text-anchor="middle" dominant-baseline="central" fill="#042C53">data[3]</text>
  <text font-family="sans-serif" font-size="11" x="371" y="117" text-anchor="middle" dominant-baseline="central" fill="#185FA5">void*</text>
  <rect x="420" y="75" width="82" height="60" rx="14" fill="#F1EFE8" stroke="#D3D1C7" stroke-width="1" stroke-dasharray="5 3"/>
  <text font-family="sans-serif" font-size="12" x="461" y="105" text-anchor="middle" dominant-baseline="central" fill="#B4B2A9">empty</text>
  <rect x="510" y="75" width="82" height="60" rx="14" fill="#F1EFE8" stroke="#D3D1C7" stroke-width="1" stroke-dasharray="5 3"/>
  <text font-family="sans-serif" font-size="12" x="551" y="105" text-anchor="middle" dominant-baseline="central" fill="#B4B2A9">empty</text>
  <line x1="60" y1="55" x2="412" y2="55" stroke="#185FA5" stroke-width="1"/>
  <line x1="60" y1="50" x2="60" y2="60" stroke="#185FA5" stroke-width="1"/>
  <line x1="412" y1="50" x2="412" y2="60" stroke="#185FA5" stroke-width="1"/>
  <text font-family="sans-serif" font-size="12" x="236" y="44" text-anchor="middle" fill="#185FA5" font-weight="500">size = 4</text>
  <line x1="60" y1="152" x2="592" y2="152" stroke="#888780" stroke-width="1"/>
  <line x1="60" y1="147" x2="60" y2="157" stroke="#888780" stroke-width="1"/>
  <line x1="592" y1="147" x2="592" y2="157" stroke="#888780" stroke-width="1"/>
  <text font-family="sans-serif" font-size="12" x="326" y="168" text-anchor="middle" fill="#888780">capacity = 6</text>
  <line x1="592" y1="105" x2="634" y2="105" stroke="#185FA5" stroke-width="1.2" marker-end="url(#ag)"/>
  <text font-family="sans-serif" font-size="11" x="638" y="96" fill="#185FA5">grow by</text>
  <text font-family="sans-serif" font-size="11" x="638" y="110" fill="#185FA5">blockSize</text>
  <text font-family="sans-serif" font-size="12" x="326" y="198" text-anchor="middle" fill="#B4B2A9">Append O(1) amort · Get/Set O(1) · stores any void* pointer</text>
</svg>
